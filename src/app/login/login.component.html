<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>🔐 Logowanie</mat-card-title>
      <mat-card-subtitle>System zarządzania magazynem</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="login()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Login</mat-label>
          <input matInput formControlName="username" autocomplete="username">
          <mat-error *ngIf="form.get('username')?.hasError('required')">Login jest wymagany</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Hasło</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password">
          <mat-error *ngIf="form.get('password')?.hasError('required')">Hasło jest wymagane</mat-error>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" class="full-width login-btn" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading" style="display:inline-block"></mat-spinner>
          <span *ngIf="!loading">Zaloguj się</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
